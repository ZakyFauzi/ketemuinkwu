<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; justify-content: center; padding: 50px 20px; color: white; }
        .login-box { background: #34495e; padding: 30px; border-radius: 12px; width: 100%; max-width: 300px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 20px 0; border: none; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 18px; letter-spacing: 5px;}
        button { background: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="margin-top: 0;">Admin Portal</h2>
        <p style="font-size: 13px; color: #bdc3c7;">Enter master PIN to access the generator.</p>
        <form action="/admin_login" method="POST">
            <input type="password" name="pin" placeholder="****" required>
            <button type="submit">Unlock Dashboard</button>
        </form>
    </div>
</body>
</html>
