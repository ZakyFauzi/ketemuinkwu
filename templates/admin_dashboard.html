<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Ketemuin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 24px;
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 10px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .link-display {
            background: #f0f4ff;
            border: 1px solid #d0e0ff;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        .link-display input {
            font-size: 12px;
            margin-top: 8px;
        }

        .owners-list {
            list-style: none;
        }

        .owner-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .owner-item strong {
            display: block;
            margin-bottom: 4px;
        }

        .owner-item small {
            color: #666;
            display: block;
            margin-bottom: 8px;
        }

        .owner-item .link {
            font-size: 12px;
            color: #667eea;
            word-break: break-all;
            background: white;
            padding: 6px;
            border-radius: 4px;
            margin-bottom: 6px;
        }

        .copy-btn {
            padding: 4px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            margin-right: 5px;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .method-check {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .method-check label {
            display: flex;
            align-items: center;
            margin: 0;
            font-weight: normal;
        }

        .method-check input {
            width: auto;
            margin-right: 6px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🔑 Admin Dashboard</h1>
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </header>

    <div class="container">
        <div class="grid-2">
            <!-- FORM BUAT OWNER BARU -->
            <div class="card">
                <h2>➕ Buat Owner Baru</h2>
                <form onsubmit="createOwner(event)">
                    <div class="form-group">
                        <label>📦 Nama Barang *</label>
                        <input type="text" id="itemName" placeholder="Cth: Tas Laptop Merah" required>
                    </div>

                    <div class="form-group">
                        <label>👤 Nama Pemilik *</label>
                        <input type="text" id="ownerName" placeholder="Cth: Budi Santoso" required>
                    </div>

                    <div class="form-group">
                        <label>📱 WhatsApp (dengan kode negara) *</label>
                        <input type="text" id="ownerWhatsapp" placeholder="628123456789" required>
                    </div>

                    <div class="form-group">
                        <label>📧 Email *</label>
                        <input type="email" id="ownerEmail" placeholder="budi@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>🆔 Telegram ID (opsional)</label>
                        <input type="text" id="ownerTelegram" placeholder="123456789">
                    </div>

                    <div class="form-group">
                        <label>📸 URL Avatar (opsional)</label>
                        <input type="url" id="ownerAvatar" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label>💬 Bio Singkat (opsional)</label>
                        <textarea id="ownerBio" placeholder="Jelaskan siapa kamu atau tips menemukan barangmu"></textarea>
                    </div>

                    <div class="form-group">
                        <label>📢 Metode Notifikasi</label>
                        <div class="method-check">
                            <label>
                                <input type="checkbox" id="notifyEmail" checked>
                                Email
                            </label>
                            <label>
                                <input type="checkbox" id="notifyTelegram">
                                Telegram
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn">✅ Buat Profil Owner</button>
                    <div class="status" id="createStatus"></div>
                </form>

                <div class="link-display" id="linkDisplay">
                    <p>✅ <strong>Profil berhasil dibuat!</strong></p>
                    <p>Link Publik:</p>
                    <input type="text" id="shareLink" readonly>
                    <button class="copy-btn" onclick="copyLink()">📋 Copy</button>
                    <button class="copy-btn" onclick="generateQR()">📊 Generate QR</button>
                </div>
            </div>

            <!-- DAFTAR OWNERS -->
            <div class="card">
                <h2>📋 Daftar Owners</h2>
                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Total: <strong id="ownerCount">0</strong> owners aktif</p>
                <ul class="owners-list" id="ownersList">
                    <li style="text-align: center; color: #999; padding: 20px;">Loading...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let currentOwnerId = null;

        async function createOwner(e) {
            e.preventDefault();

            const data = {
                item_name: document.getElementById('itemName').value,
                owner_name: document.getElementById('ownerName').value,
                owner_whatsapp: document.getElementById('ownerWhatsapp').value,
                owner_email: document.getElementById('ownerEmail').value,
                owner_telegram_id: document.getElementById('ownerTelegram').value,
                owner_avatar: document.getElementById('ownerAvatar').value,
                owner_bio: document.getElementById('ownerBio').value,
                notification_method: getNotificationMethod()
            };

            const btn = event.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = '⏳ Membuat...';

            try {
                const response = await fetch('/api/admin/create-owner', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    currentOwnerId = result.owner_id;
                    document.getElementById('shareLink').value = window.location.origin + result.profile_url;
                    document.getElementById('linkDisplay').style.display = 'block';
                    showStatus('createStatus', '✅ Owner berhasil dibuat!', 'success');
                    
                    // Reset form
                    document.querySelector('form').reset();
                    
                    // Reload owners list
                    loadOwners();
                } else {
                    showStatus('createStatus', '❌ ' + (result.error || 'Gagal membuat owner'), 'error');
                }
            } catch (err) {
                showStatus('createStatus', '❌ Error: ' + err.message, 'error');
            }

            btn.disabled = false;
            btn.textContent = '✅ Buat Profil Owner';
        }

        function getNotificationMethod() {
            const email = document.getElementById('notifyEmail').checked;
            const telegram = document.getElementById('notifyTelegram').checked;

            if (email && telegram) return 'both';
            if (telegram) return 'telegram';
            return 'email';
        }

        function copyLink() {
            const input = document.getElementById('shareLink');
            input.select();
            document.execCommand('copy');
            alert('📋 Link disalin!');
        }

        function generateQR() {
            const url = document.getElementById('shareLink').value;
            const qrUrl = `https://qr-code-generator.com/?url=${encodeURIComponent(url)}`;
            window.open(qrUrl, '_blank');
        }

        async function loadOwners() {
            try {
                const response = await fetch('/api/admin/owners');
                const owners = await response.json();

                document.getElementById('ownerCount').textContent = owners.length;

                if (owners.length === 0) {
                    document.getElementById('ownersList').innerHTML = '<li style="text-align: center; color: #999; padding: 20px;">Belum ada owner</li>';
                    return;
                }

                let html = '';
                owners.forEach(owner => {
                    const link = `${window.location.origin}/profile/${owner.id}`;
                    html += `
                        <li class="owner-item">
                            <strong>📦 ${owner.item_name}</strong>
                            <small>👤 ${owner.owner_name} | 📧 ${owner.owner_email}</small>
                            <div class="link">${link}</div>
                            <button class="copy-btn" onclick="copyToClipboard('${link}')">📋 Copy</button>
                            <button class="copy-btn" onclick="openQR('${link}')">📊 QR</button>
                        </li>
                    `;
                });

                document.getElementById('ownersList').innerHTML = html;
            } catch (err) {
                console.error('Load owners error:', err);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('📋 Disalin!');
            });
        }

        function openQR(url) {
            const qrUrl = `https://qr-code-generator.com/?url=${encodeURIComponent(url)}`;
            window.open(qrUrl, '_blank');
        }

        function showStatus(elementId, msg, type) {
            const el = document.getElementById(elementId);
            el.textContent = msg;
            el.className = 'status ' + type;
        }

        async function logout() {
            if (confirm('⚠️ Logout?')) {
                await fetch('/api/admin/logout', { method: 'POST' });
                window.location.href = '/admin';
            }
        }

        // Load owners on page load
        window.addEventListener('load', loadOwners);
    </script>
</body>
</html>
