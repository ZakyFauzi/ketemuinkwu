<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tag Setup</title></head>
<body style="font-family: sans-serif; text-align: center; padding: 30px; background: #f4f7f6;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h2>Tag Not Activated</h2>
        <p style="color: gray;">If you are the owner, please activate this tag at our main portal.</p>
        <h1 style="color: #e74c3c; letter-spacing: 2px;">{{ tag_id }}</h1>
        <p>Copy the Tag ID above and go to:</p>
        <a href="{{ platform_url }}" style="text-decoration: none;">
            <button style="background: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold;">Go to Main Portal</button>
        </a>
    </div>
</body>
</html>
