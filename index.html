<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketemuin - Smart Lost & Found</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --ink: #1c2a3a;
            --muted: #58657a;
            --brand: #1572d3;
            --brand-dark: #0f5bb0;
            --card: #ffffff;
            --line: #d8dfeb;
            --ok: #1f8f48;
            --danger: #cc2f45;
            --hero: linear-gradient(120deg, #0a4d8f 0%, #1572d3 55%, #3aa8f3 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 10%, #d8ecff 0%, transparent 35%),
                radial-gradient(circle at 90% 0%, #e8f7ff 0%, transparent 30%),
                var(--bg);
            min-height: 100vh;
            line-height: 1.5;
        }

        .site-header {
            padding: 18px 20px;
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(6px);
            background: rgba(245, 247, 251, 0.82);
            border-bottom: 1px solid rgba(216, 223, 235, 0.7);
        }

        .header-wrap {
            max-width: 1120px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .brand {
            font-weight: 800;
            letter-spacing: 0.3px;
            font-size: 20px;
            color: #0e3b6a;
            cursor: pointer;
            border: none;
            background: transparent;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .shell {
            max-width: 1120px;
            margin: 24px auto 40px;
            padding: 0 16px;
        }

        .hero {
            background: var(--hero);
            border-radius: 18px;
            padding: 48px 24px;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        .hero::after {
            content: "";
            position: absolute;
            right: -40px;
            top: -40px;
            width: 220px;
            height: 220px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 50%;
        }

        .hero h1 {
            font-size: 40px;
            line-height: 1.1;
            margin-bottom: 12px;
            max-width: 640px;
        }

        .hero p {
            max-width: 620px;
            color: #e8f4ff;
            font-size: 17px;
            margin-bottom: 20px;
        }

        .feature-grid {
            margin-top: 26px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .feature {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 18px rgba(25, 47, 74, 0.06);
        }

        .feature h3 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #0f315b;
        }

        .feature p {
            color: var(--muted);
            font-size: 14px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 18px rgba(25, 47, 74, 0.05);
        }

        .panel + .panel {
            margin-top: 16px;
        }

        .panel h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #123f6f;
        }

        .panel p.lead {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 16px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .form-grid .full {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        textarea,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 14px;
            font-family: inherit;
            color: var(--ink);
            background: #fff;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(21, 114, 211, 0.14);
        }

        textarea {
            min-height: 94px;
            resize: vertical;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--brand);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--brand-dark);
        }

        .btn-soft {
            background: #e9f3ff;
            color: #0f447d;
        }

        .btn-danger {
            background: #ffe8ec;
            color: #8a2434;
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .status {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
        }

        .status.ok {
            background: #e8f7ee;
            border: 1px solid #bfe8ce;
            color: var(--ok);
        }

        .status.err {
            background: #ffecee;
            border: 1px solid #ffd0d7;
            color: var(--danger);
        }

        .owner-list {
            display: grid;
            gap: 10px;
            margin-top: 12px;
        }

        .owner-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
            background: #fafcff;
        }

        .owner-card strong {
            display: block;
            margin-bottom: 4px;
            color: #0e3e70;
        }

        .owner-link {
            margin-top: 8px;
            background: #fff;
            border: 1px dashed #b8c4d8;
            padding: 8px;
            font-size: 12px;
            color: #274e7e;
            word-break: break-all;
            border-radius: 8px;
        }

        .profile {
            display: grid;
            gap: 14px;
        }

        .profile-head {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 2px solid #dce8f8;
            background: #e8f3ff;
            color: #0f4a87;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 26px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .meta {
            color: var(--muted);
            font-size: 14px;
        }

        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #cdd9ea;
            background: #f2f7ff;
            color: #254b78;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .hidden {
            display: none !important;
        }

        .empty {
            color: var(--muted);
            font-size: 14px;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--line);
            margin: 14px 0;
        }

        @media (max-width: 860px) {
            .hero h1 {
                font-size: 30px;
            }

            .feature-grid {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .profile-head {
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-wrap">
            <button class="brand" id="brandHome">Ketemuin</button>
            <div class="header-actions">
                <button class="btn btn-soft" id="goHome">Home</button>
                <button class="btn btn-primary" id="goAdmin">Admin</button>
            </div>
        </div>
    </header>

    <main class="shell" id="app"></main>

    <script>
        const STORAGE_KEYS = {
            owners: "ketemuin_owners",
            messages: "ketemuin_messages",
            locations: "ketemuin_locations",
            adminPwd: "ketemuin_admin_password",
            adminLogin: "ketemuin_admin_login"
        };

        const defaultAdminPassword = "9999";

        function getOwners() {
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.owners) || "{}");
        }

        function setOwners(data) {
            localStorage.setItem(STORAGE_KEYS.owners, JSON.stringify(data));
        }

        function getMessages() {
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.messages) || "{}");
        }

        function setMessages(data) {
            localStorage.setItem(STORAGE_KEYS.messages, JSON.stringify(data));
        }

        function getLocations() {
            return JSON.parse(localStorage.getItem(STORAGE_KEYS.locations) || "{}");
        }

        function setLocations(data) {
            localStorage.setItem(STORAGE_KEYS.locations, JSON.stringify(data));
        }

        function getAdminPassword() {
            return localStorage.getItem(STORAGE_KEYS.adminPwd) || defaultAdminPassword;
        }

        function setAdminPassword(password) {
            localStorage.setItem(STORAGE_KEYS.adminPwd, password);
        }

        function isAdminLoggedIn() {
            return localStorage.getItem(STORAGE_KEYS.adminLogin) === "1";
        }

        function setAdminLoggedIn(status) {
            localStorage.setItem(STORAGE_KEYS.adminLogin, status ? "1" : "0");
        }

        function uid() {
            return Math.random().toString(36).slice(2, 12);
        }

        function escapeHtml(text) {
            return String(text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function profileUrlById(ownerId) {
            return `${window.location.origin}/profile/${ownerId}`;
        }

        function getCurrentPath() {
            if (window.location.protocol === "file:") {
                const hashPath = (window.location.hash || "").replace(/^#/, "").trim();
                return hashPath || "/";
            }
            return window.location.pathname.replace(/\/+$/, "") || "/";
        }

        function navigate(path) {
            if (window.location.protocol === "file:") {
                window.location.hash = path;
                renderRoute();
                return;
            }
            history.pushState({}, "", path);
            renderRoute();
        }

        function toast(type, text) {
            return `<div class="status ${type}">${escapeHtml(text)}</div>`;
        }

        function landingView() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="hero">
                    <h1>Lost & Found modern, rapi, dan mobile-first.</h1>
                    <p>
                        Ketemuin versi serverless: tanpa backend, gratis deploy di Vercel/Netlify,
                        dan tetap punya flow Admin + Profil Publik.
                    </p>
                    <div class="button-row">
                        <button class="btn btn-primary" id="heroAdmin">Masuk Admin</button>
                        <button class="btn btn-soft" id="heroDemo">Lihat Profil Demo</button>
                    </div>
                </section>

                <section class="feature-grid">
                    <article class="feature">
                        <h3>Admin Tersembunyi</h3>
                        <p>Publik hanya lihat landing page dan profil. Halaman admin tetap ada password.</p>
                    </article>
                    <article class="feature">
                        <h3>Profil Publik Bersih</h3>
                        <p>Link profil hanya menampilkan info owner, tombol lokasi, dan kirim pesan.</p>
                    </article>
                    <article class="feature">
                        <h3>100% Static & Gratis</h3>
                        <p>Semua data disimpan di localStorage untuk demo/POC, tanpa server Python.</p>
                    </article>
                </section>
            `;

            document.getElementById("heroAdmin").addEventListener("click", () => navigate("/admin"));
            document.getElementById("heroDemo").addEventListener("click", () => {
                const owners = getOwners();
                const firstId = Object.keys(owners)[0];
                if (!firstId) {
                    alert("Belum ada owner. Buat dulu lewat Admin.");
                    return;
                }
                navigate(`/profile/${firstId}`);
            });
        }

        function adminLoginView() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="panel" style="max-width: 520px; margin: 10px auto;">
                    <h2>Admin Login</h2>
                    <p class="lead">Masuk ke dashboard untuk membuat owner profile dan link publik.</p>
                    <div class="form-grid">
                        <div class="full">
                            <label>Password Admin</label>
                            <input id="adminPwdInput" type="password" placeholder="Masukkan password admin">
                        </div>
                        <div class="full button-row">
                            <button class="btn btn-primary" id="adminLoginBtn">Masuk</button>
                            <button class="btn btn-soft" id="adminBackBtn">Kembali</button>
                        </div>
                    </div>
                    <div id="adminLoginStatus"></div>
                </section>
            `;

            document.getElementById("adminBackBtn").addEventListener("click", () => navigate("/"));
            document.getElementById("adminLoginBtn").addEventListener("click", () => {
                const val = document.getElementById("adminPwdInput").value.trim();
                const status = document.getElementById("adminLoginStatus");
                if (val !== getAdminPassword()) {
                    status.innerHTML = toast("err", "Password salah.");
                    return;
                }
                setAdminLoggedIn(true);
                navigate("/admin");
            });
        }

        function ownerCard(ownerId, owner) {
            return `
                <div class="owner-card">
                    <strong>${escapeHtml(owner.itemName)}</strong>
                    <div class="meta">Owner: ${escapeHtml(owner.name)}</div>
                    <div class="meta">WA: ${escapeHtml(owner.whatsapp)}</div>
                    <div class="owner-link">${escapeHtml(profileUrlById(ownerId))}</div>
                    <div class="button-row" style="margin-top:8px;">
                        <button class="btn btn-soft" data-copy="${escapeHtml(profileUrlById(ownerId))}">Copy Link</button>
                        <button class="btn btn-soft" data-open="${escapeHtml(ownerId)}">Buka Profil</button>
                    </div>
                </div>
            `;
        }

        function adminDashboardView() {
            const owners = getOwners();
            const app = document.getElementById("app");
            const ownerEntries = Object.entries(owners);

            app.innerHTML = `
                <section class="panel">
                    <h2>Admin Dashboard</h2>
                    <p class="lead">Buat profil owner, generate link publik, dan kelola data demo.</p>
                    <div class="button-row" style="margin-bottom: 12px;">
                        <button class="btn btn-danger" id="logoutAdmin">Logout</button>
                    </div>
                    <div class="form-grid">
                        <div>
                            <label>Nama Pemilik</label>
                            <input id="oName" placeholder="Budi Santoso">
                        </div>
                        <div>
                            <label>Nama Barang</label>
                            <input id="oItem" placeholder="Tas Laptop Hitam">
                        </div>
                        <div>
                            <label>WhatsApp</label>
                            <input id="oWa" placeholder="628123456789">
                        </div>
                        <div>
                            <label>Email</label>
                            <input id="oEmail" type="email" placeholder="budi@email.com">
                        </div>
                        <div>
                            <label>Telegram Username (tanpa @)</label>
                            <input id="oTg" placeholder="budiowner">
                        </div>
                        <div>
                            <label>Avatar URL</label>
                            <input id="oAvatar" placeholder="https://...">
                        </div>
                        <div class="full">
                            <label>Bio</label>
                            <textarea id="oBio" placeholder="Titip pesan untuk penemu barangmu"></textarea>
                        </div>
                        <div class="full button-row">
                            <button class="btn btn-primary" id="createOwnerBtn">Simpan Owner</button>
                        </div>
                    </div>
                    <div id="createOwnerStatus"></div>
                    <hr class="divider">
                    <div class="form-grid">
                        <div>
                            <label>Ganti Password Admin</label>
                            <input id="newAdminPwd" type="password" placeholder="Password baru">
                        </div>
                        <div class="button-row" style="align-items:end;">
                            <button class="btn btn-soft" id="saveAdminPwd">Update Password</button>
                        </div>
                    </div>
                    <div id="adminPwdStatus"></div>
                </section>

                <section class="panel">
                    <h2>Daftar Owner (${ownerEntries.length})</h2>
                    <p class="lead">Semua profil publik yang sudah dibuat dari browser ini.</p>
                    <div class="owner-list" id="ownerListWrap">
                        ${ownerEntries.length ? ownerEntries.map(([id, owner]) => ownerCard(id, owner)).join("") : `<div class="empty">Belum ada owner.</div>`}
                    </div>
                </section>
            `;

            document.getElementById("logoutAdmin").addEventListener("click", () => {
                setAdminLoggedIn(false);
                navigate("/");
            });

            document.getElementById("createOwnerBtn").addEventListener("click", () => {
                const owner = {
                    name: document.getElementById("oName").value.trim(),
                    itemName: document.getElementById("oItem").value.trim(),
                    whatsapp: document.getElementById("oWa").value.trim(),
                    email: document.getElementById("oEmail").value.trim(),
                    telegram: document.getElementById("oTg").value.trim(),
                    avatar: document.getElementById("oAvatar").value.trim(),
                    bio: document.getElementById("oBio").value.trim(),
                    createdAt: new Date().toISOString()
                };
                const status = document.getElementById("createOwnerStatus");

                if (!owner.name || !owner.itemName || !owner.whatsapp) {
                    status.innerHTML = toast("err", "Nama, barang, dan WhatsApp wajib diisi.");
                    return;
                }

                const id = uid();
                const db = getOwners();
                db[id] = owner;
                setOwners(db);
                status.innerHTML = toast("ok", `Owner berhasil disimpan. Link: ${profileUrlById(id)}`);
                renderRoute();
            });

            document.getElementById("saveAdminPwd").addEventListener("click", () => {
                const val = document.getElementById("newAdminPwd").value.trim();
                const status = document.getElementById("adminPwdStatus");
                if (val.length < 4) {
                    status.innerHTML = toast("err", "Password minimal 4 karakter.");
                    return;
                }
                setAdminPassword(val);
                status.innerHTML = toast("ok", "Password admin berhasil diupdate.");
                document.getElementById("newAdminPwd").value = "";
            });

            document.querySelectorAll("[data-copy]").forEach((btn) => {
                btn.addEventListener("click", async () => {
                    await navigator.clipboard.writeText(btn.getAttribute("data-copy"));
                    btn.textContent = "Copied";
                    setTimeout(() => { btn.textContent = "Copy Link"; }, 1000);
                });
            });

            document.querySelectorAll("[data-open]").forEach((btn) => {
                btn.addEventListener("click", () => {
                    navigate(`/profile/${btn.getAttribute("data-open")}`);
                });
            });
        }

        function sendMessageLink(owner, method, text) {
            const encoded = encodeURIComponent(text);

            if (method === "wa") {
                return `https://api.whatsapp.com/send?phone=${encodeURIComponent(owner.whatsapp || "")}&text=${encoded}`;
            }
            if (method === "email") {
                return `mailto:${encodeURIComponent(owner.email || "")}?subject=${encodeURIComponent("Info Barang Ketemuin")}&body=${encoded}`;
            }
            if (method === "telegram") {
                if (!owner.telegram) {
                    return "";
                }
                return `https://t.me/${encodeURIComponent(owner.telegram)}?text=${encoded}`;
            }
            return "";
        }

        function publicProfileView(ownerId) {
            const owners = getOwners();
            const owner = owners[ownerId];
            const app = document.getElementById("app");

            if (!owner) {
                notFoundView("Profil owner tidak ditemukan.");
                return;
            }

            const displayAvatar = owner.avatar
                ? `<img src="${escapeHtml(owner.avatar)}" alt="Avatar">`
                : escapeHtml((owner.name || "O").slice(0, 1).toUpperCase());

            app.innerHTML = `
                <section class="panel profile">
                    <div class="profile-head">
                        <div class="avatar">${displayAvatar}</div>
                        <div>
                            <h2>${escapeHtml(owner.name)}</h2>
                            <div class="meta">Barang: ${escapeHtml(owner.itemName)}</div>
                            ${owner.bio ? `<div class="meta" style="margin-top:6px;">"${escapeHtml(owner.bio)}"</div>` : ""}
                        </div>
                    </div>

                    <div>
                        <span class="pill">WA: ${escapeHtml(owner.whatsapp)}</span>
                        ${owner.email ? `<span class="pill">Email: ${escapeHtml(owner.email)}</span>` : ""}
                        ${owner.telegram ? `<span class="pill">Telegram: @${escapeHtml(owner.telegram)}</span>` : ""}
                    </div>

                    <div class="button-row">
                        <a class="btn btn-primary" href="${sendMessageLink(owner, "wa", "Halo, saya menemukan barangmu.")}" target="_blank" rel="noopener noreferrer">Chat WhatsApp</a>
                        ${owner.email ? `<a class="btn btn-soft" href="${sendMessageLink(owner, "email", "Halo, saya menemukan barangmu.")}">Kirim Email</a>` : ""}
                        ${owner.telegram ? `<a class="btn btn-soft" href="${sendMessageLink(owner, "telegram", "Halo, saya menemukan barangmu.")}" target="_blank" rel="noopener noreferrer">Kirim Telegram</a>` : ""}
                    </div>

                    <hr class="divider">

                    <h3>Bagikan Lokasi Penemuan</h3>
                    <p class="lead">Klik tombol di bawah untuk kirim koordinatmu ke pemilik.</p>
                    <div class="button-row">
                        <button class="btn btn-primary" id="shareLocBtn">Bagikan Lokasi</button>
                    </div>
                    <div id="locationStatus"></div>

                    <hr class="divider">

                    <h3>Kirim Pesan</h3>
                    <div class="form-grid">
                        <div>
                            <label>Nama Kamu</label>
                            <input id="finderName" placeholder="Nama kamu">
                        </div>
                        <div>
                            <label>Metode</label>
                            <select id="finderMethod">
                                <option value="wa">WhatsApp</option>
                                <option value="email" ${owner.email ? "" : "disabled"}>Email</option>
                                <option value="telegram" ${owner.telegram ? "" : "disabled"}>Telegram</option>
                            </select>
                        </div>
                        <div class="full">
                            <label>Pesan</label>
                            <textarea id="finderMessage" placeholder="Halo, saya menemukan barangmu di ..."></textarea>
                        </div>
                        <div class="full button-row">
                            <button class="btn btn-primary" id="sendMessageBtn">Kirim Pesan Sekarang</button>
                        </div>
                    </div>
                    <div id="messageStatus"></div>
                </section>
            `;

            document.getElementById("shareLocBtn").addEventListener("click", () => {
                const status = document.getElementById("locationStatus");
                if (!navigator.geolocation) {
                    status.innerHTML = toast("err", "Browser tidak mendukung geolocation.");
                    return;
                }
                status.innerHTML = toast("ok", "Mengambil lokasi...");
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const maps = `https://maps.google.com/?q=${lat},${lng}`;

                    const logs = getLocations();
                    logs[ownerId] = logs[ownerId] || [];
                    logs[ownerId].push({
                        lat,
                        lng,
                        maps,
                        at: new Date().toISOString()
                    });
                    setLocations(logs);

                    status.innerHTML = `<div class="status ok">Lokasi siap dikirim. <a href="${maps}" target="_blank" rel="noopener noreferrer">Buka Google Maps</a></div>`;
                }, () => {
                    status.innerHTML = toast("err", "Izin lokasi ditolak atau gagal dibaca.");
                });
            });

            document.getElementById("sendMessageBtn").addEventListener("click", () => {
                const name = document.getElementById("finderName").value.trim() || "Penemu";
                const method = document.getElementById("finderMethod").value;
                const msg = document.getElementById("finderMessage").value.trim();
                const status = document.getElementById("messageStatus");

                if (!msg) {
                    status.innerHTML = toast("err", "Pesan tidak boleh kosong.");
                    return;
                }

                const fullText = `[Ketemuin] ${name}: ${msg}`;
                const link = sendMessageLink(owner, method, fullText);
                if (!link) {
                    status.innerHTML = toast("err", "Metode ini belum tersedia untuk owner ini.");
                    return;
                }

                const history = getMessages();
                history[ownerId] = history[ownerId] || [];
                history[ownerId].push({
                    sender: name,
                    method,
                    message: msg,
                    at: new Date().toISOString()
                });
                setMessages(history);

                window.open(link, "_blank", "noopener,noreferrer");
                status.innerHTML = toast("ok", "Pesan diproses. Aplikasi chat/email kamu sudah dibuka.");
                document.getElementById("finderMessage").value = "";
            });
        }

        function notFoundView(message) {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="panel" style="max-width: 700px; margin: 10px auto;">
                    <h2>Halaman Tidak Ditemukan</h2>
                    <p class="lead">${escapeHtml(message || "Path tidak dikenal.")}</p>
                    <div class="button-row">
                        <button class="btn btn-primary" id="backHomeNF">Kembali ke Home</button>
                    </div>
                </section>
            `;
            document.getElementById("backHomeNF").addEventListener("click", () => navigate("/"));
        }

        function renderRoute() {
            const path = getCurrentPath();

            if (path === "/") {
                landingView();
                return;
            }

            if (path === "/admin") {
                if (isAdminLoggedIn()) {
                    adminDashboardView();
                } else {
                    adminLoginView();
                }
                return;
            }

            if (path.startsWith("/profile/")) {
                const ownerId = path.replace("/profile/", "").trim();
                if (!ownerId) {
                    notFoundView("Owner ID kosong.");
                    return;
                }
                publicProfileView(ownerId);
                return;
            }

            notFoundView("Route ini tidak tersedia di mode static.");
        }

        document.getElementById("brandHome").addEventListener("click", () => navigate("/"));
        document.getElementById("goHome").addEventListener("click", () => navigate("/"));
        document.getElementById("goAdmin").addEventListener("click", () => navigate("/admin"));

        window.addEventListener("popstate", renderRoute);
        window.addEventListener("hashchange", renderRoute);
        renderRoute();
    </script>
</body>
</html>
