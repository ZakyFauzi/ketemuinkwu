<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ketemuin - Free Cloud Edition</title>
    <style>
        :root {
            --bg: #f2f5f8;
            --ink: #17324d;
            --muted: #5e738a;
            --card: #ffffff;
            --line: #d8e2ee;
            --brand: #0f6ecd;
            --brand-2: #27a2e4;
            --ok: #187e3f;
            --danger: #b92f45;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Segoe UI, Tahoma, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 8% 10%, #dff0ff 0%, transparent 30%),
                radial-gradient(circle at 88% 0%, #eaf7ff 0%, transparent 28%),
                var(--bg);
            min-height: 100vh;
            line-height: 1.5;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(4px);
            background: rgba(242, 245, 248, 0.86);
            border-bottom: 1px solid rgba(216, 226, 238, 0.8);
        }

        .header-wrap {
            max-width: 1080px;
            margin: 0 auto;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            color: #0a467f;
            letter-spacing: 0.3px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .row { display: flex; gap: 10px; flex-wrap: wrap; }

        .container {
            max-width: 1080px;
            margin: 20px auto 34px;
            padding: 0 16px;
        }

        .hero {
            background: linear-gradient(120deg, #0a467f 0%, #0f6ecd 58%, #27a2e4 100%);
            border-radius: 18px;
            color: #ffffff;
            padding: 44px 22px;
            margin-bottom: 18px;
            overflow: hidden;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            right: -40px;
            top: -54px;
            width: 210px;
            height: 210px;
            background: rgba(255, 255, 255, 0.16);
            border-radius: 50%;
        }

        .hero h1 { font-size: 38px; line-height: 1.1; max-width: 680px; margin-bottom: 12px; }
        .hero p { max-width: 650px; color: #e8f4ff; margin-bottom: 18px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 10px 16px rgba(22, 48, 74, 0.05);
        }

        .panel + .panel { margin-top: 14px; }

        .panel h2 { font-size: 24px; margin-bottom: 6px; color: #0d4378; }
        .panel h3 { font-size: 18px; margin-bottom: 8px; }
        .lead { color: var(--muted); font-size: 14px; margin-bottom: 14px; }

        .feature h3 { color: #0d4378; margin-bottom: 4px; font-size: 17px; }
        .feature p { color: var(--muted); font-size: 14px; }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .full { grid-column: 1 / -1; }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 5px;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 11px;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
            color: var(--ink);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(15, 110, 205, 0.15);
        }

        textarea { min-height: 95px; resize: vertical; }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 13px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: .18s;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-primary:hover { background: #0c5fb0; }
        .btn-soft { background: #e8f2ff; color: #0d4a85; }
        .btn-danger { background: #ffe8ec; color: #8d2435; }

        .status {
            margin-top: 10px;
            border-radius: 9px;
            padding: 9px 11px;
            font-size: 13px;
        }

        .ok { background: #eaf8f0; border: 1px solid #bfe9cf; color: var(--ok); }
        .err { background: #ffedf0; border: 1px solid #ffd1d8; color: var(--danger); }

        .owner-list { display: grid; gap: 10px; }

        .owner-item {
            background: #fafcff;
            border: 1px solid #d5e1ef;
            border-radius: 10px;
            padding: 11px;
        }

        .owner-item strong { color: #0d447a; display: block; margin-bottom: 4px; }
        .meta { color: var(--muted); font-size: 13px; }

        .link {
            margin-top: 7px;
            background: #ffffff;
            border: 1px dashed #b9cade;
            border-radius: 8px;
            font-size: 12px;
            padding: 8px;
            word-break: break-all;
            color: #274d7b;
        }

        .profile-head { display: flex; align-items: center; gap: 12px; }

        .avatar {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 2px solid #d8e7fa;
            background: #eaf3ff;
            color: #0d4a85;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 26px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .pill {
            display: inline-block;
            font-size: 12px;
            border-radius: 999px;
            border: 1px solid #cbdaee;
            background: #f2f7ff;
            color: #214a79;
            padding: 6px 10px;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .divider { border: none; border-top: 1px solid var(--line); margin: 12px 0; }
        .empty { color: var(--muted); font-size: 14px; }

        .setup-note {
            background: #fff3e6;
            border: 1px solid #ffd5a8;
            color: #8f5208;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 12px;
        }

        @media (max-width: 900px) {
            .hero h1 { font-size: 30px; }
            .grid { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-wrap">
            <button class="brand" id="brandHome">Ketemuin</button>
            <div class="row">
                <button class="btn btn-soft" id="goHome">Home</button>
                <button class="btn btn-primary" id="goAdmin">Admin</button>
            </div>
        </div>
    </header>

    <main class="container" id="app"></main>

    <script>
        let sb = null;
        let currentUser = null;

        function esc(v) {
            return String(v || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function status(type, text) {
            return `<div class="status ${type}">${esc(text)}</div>`;
        }

        function getCurrentPath() {
            if (window.location.protocol === "file:") {
                const h = (window.location.hash || "").replace(/^#/, "").trim();
                return h || "/";
            }
            return window.location.pathname.replace(/\/+$/, "") || "/";
        }

        function navigate(path) {
            if (window.location.protocol === "file:") {
                window.location.hash = path;
                renderRoute();
                return;
            }
            history.pushState({}, "", path);
            renderRoute();
        }

        function makeShortId() {
            return Math.random().toString(36).slice(2, 12);
        }

        function profileUrl(shortId) {
            return `${window.location.origin}/profile/${shortId}`;
        }

        function ensureSupabaseConfigured() {
            const url = window.KETEMUIN_SUPABASE_URL;
            const key = window.KETEMUIN_SUPABASE_ANON_KEY;
            return Boolean(url && key && window.supabase && window.supabase.createClient);
        }

        function setupMissingView() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="panel" style="max-width:760px; margin: 10px auto;">
                    <h2>Setup Supabase Dulu</h2>
                    <p class="lead">App ini sudah full free, tapi butuh koneksi ke Supabase agar datanya tersimpan cloud.</p>
                    <div class="setup-note">
                        Buat file supabase-config.js di root project lalu isi KETEMUIN_SUPABASE_URL dan KETEMUIN_SUPABASE_ANON_KEY.
                    </div>
                    <div class="setup-note">
                        Setelah itu jalankan SQL schema dari file supabase-schema.sql di SQL Editor Supabase.
                    </div>
                </section>
            `;
        }

        async function initSupabase() {
            if (!ensureSupabaseConfigured()) {
                setupMissingView();
                return false;
            }

            sb = window.supabase.createClient(
                window.KETEMUIN_SUPABASE_URL,
                window.KETEMUIN_SUPABASE_ANON_KEY
            );

            const sessionRes = await sb.auth.getSession();
            currentUser = sessionRes.data.session ? sessionRes.data.session.user : null;
            return true;
        }

        function landingView() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="hero">
                    <h1>Bukan prototype lagi. Sekarang cloud storage gratis.</h1>
                    <p>
                        Ketemuin Free Cloud Edition pakai Supabase. Frontend tetap static,
                        tapi data owner, pesan, dan lokasi tersimpan online lintas device.
                    </p>
                    <div class="row">
                        <button class="btn btn-primary" id="heroAdmin">Masuk Admin</button>
                    </div>
                </section>

                <section class="grid">
                    <article class="panel feature">
                        <h3>Tanpa Flask</h3>
                        <p>Deploy langsung ke Netlify atau Vercel tanpa server Python.</p>
                    </article>
                    <article class="panel feature">
                        <h3>Data Cloud Gratis</h3>
                        <p>Supabase free tier cukup untuk MVP dan demo production-like.</p>
                    </article>
                    <article class="panel feature">
                        <h3>Admin Tetap Ada</h3>
                        <p>Admin login pakai Supabase Auth, public hanya lihat profil.</p>
                    </article>
                </section>
            `;
            document.getElementById("heroAdmin").addEventListener("click", () => navigate("/admin"));
        }

        function adminLoginView() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="panel" style="max-width: 560px; margin: 10px auto;">
                    <h2>Admin Login</h2>
                    <p class="lead">Gunakan email dan password dari Supabase Auth.</p>
                    <div class="form-grid">
                        <div class="full">
                            <label>Email Admin</label>
                            <input id="adminEmail" type="email" placeholder="admin@ketemuin.com">
                        </div>
                        <div class="full">
                            <label>Password Admin</label>
                            <input id="adminPass" type="password" placeholder="Password">
                        </div>
                        <div class="full row">
                            <button class="btn btn-primary" id="loginBtn">Masuk</button>
                            <button class="btn btn-soft" id="backBtn">Kembali</button>
                        </div>
                    </div>
                    <div id="loginStatus"></div>
                </section>
            `;

            document.getElementById("backBtn").addEventListener("click", () => navigate("/"));
            document.getElementById("loginBtn").addEventListener("click", async () => {
                const email = document.getElementById("adminEmail").value.trim();
                const pass = document.getElementById("adminPass").value.trim();
                const slot = document.getElementById("loginStatus");

                if (!email || !pass) {
                    slot.innerHTML = status("err", "Email dan password wajib diisi.");
                    return;
                }

                const res = await sb.auth.signInWithPassword({ email, password: pass });
                if (res.error) {
                    slot.innerHTML = status("err", res.error.message);
                    return;
                }

                currentUser = res.data.user;
                navigate("/admin");
            });
        }

        function ownerItem(owner) {
            const publicLink = profileUrl(owner.short_id);
            return `
                <div class="owner-item">
                    <strong>${esc(owner.item_name)}</strong>
                    <div class="meta">Owner: ${esc(owner.owner_name)}</div>
                    <div class="meta">WA: ${esc(owner.owner_whatsapp)}</div>
                    <div class="link">${esc(publicLink)}</div>
                    <div class="row" style="margin-top:8px;">
                        <button class="btn btn-soft" data-copy="${esc(publicLink)}">Copy Link</button>
                        <button class="btn btn-soft" data-open="${esc(owner.short_id)}">Buka Profil</button>
                    </div>
                </div>
            `;
        }

        async function adminDashboardView() {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="panel">
                    <h2>Admin Dashboard</h2>
                    <p class="lead">Buat owner profile dan generate link publik.</p>
                    <div class="row" style="margin-bottom:12px;">
                        <button class="btn btn-danger" id="logoutBtn">Logout</button>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label>Nama Owner</label>
                            <input id="fName" placeholder="Budi Santoso">
                        </div>
                        <div>
                            <label>Nama Barang</label>
                            <input id="fItem" placeholder="Tas Laptop Hitam">
                        </div>
                        <div>
                            <label>WhatsApp</label>
                            <input id="fWa" placeholder="628123456789">
                        </div>
                        <div>
                            <label>Email</label>
                            <input id="fEmail" type="email" placeholder="budi@email.com">
                        </div>
                        <div>
                            <label>Telegram Username</label>
                            <input id="fTg" placeholder="budiowner">
                        </div>
                        <div>
                            <label>Avatar URL</label>
                            <input id="fAvatar" placeholder="https://...">
                        </div>
                        <div class="full">
                            <label>Bio</label>
                            <textarea id="fBio" placeholder="Pesan untuk penemu"></textarea>
                        </div>
                        <div class="full row">
                            <button class="btn btn-primary" id="saveOwnerBtn">Simpan Owner</button>
                        </div>
                    </div>
                    <div id="ownerCreateStatus"></div>
                </section>

                <section class="panel">
                    <h3>Daftar Owner Saya</h3>
                    <p class="lead">Semua owner yang kamu buat dari akun admin ini.</p>
                    <div id="ownerList" class="owner-list"></div>
                </section>
            `;

            document.getElementById("logoutBtn").addEventListener("click", async () => {
                await sb.auth.signOut();
                currentUser = null;
                navigate("/");
            });

            document.getElementById("saveOwnerBtn").addEventListener("click", async () => {
                const payload = {
                    short_id: makeShortId(),
                    owner_name: document.getElementById("fName").value.trim(),
                    item_name: document.getElementById("fItem").value.trim(),
                    owner_whatsapp: document.getElementById("fWa").value.trim(),
                    owner_email: document.getElementById("fEmail").value.trim(),
                    owner_telegram: document.getElementById("fTg").value.trim(),
                    owner_avatar: document.getElementById("fAvatar").value.trim(),
                    owner_bio: document.getElementById("fBio").value.trim(),
                    created_by: currentUser.id
                };

                const slot = document.getElementById("ownerCreateStatus");

                if (!payload.owner_name || !payload.item_name || !payload.owner_whatsapp) {
                    slot.innerHTML = status("err", "Nama owner, nama barang, dan WhatsApp wajib diisi.");
                    return;
                }

                const inserted = await sb.from("owners").insert(payload).select().single();
                if (inserted.error) {
                    slot.innerHTML = status("err", inserted.error.message);
                    return;
                }

                slot.innerHTML = status("ok", `Owner berhasil dibuat. Link: ${profileUrl(inserted.data.short_id)}`);
                await loadMyOwners();
            });

            async function loadMyOwners() {
                const list = document.getElementById("ownerList");
                const q = await sb
                    .from("owners")
                    .select("id, short_id, owner_name, item_name, owner_whatsapp")
                    .eq("created_by", currentUser.id)
                    .order("created_at", { ascending: false });

                if (q.error) {
                    list.innerHTML = status("err", q.error.message);
                    return;
                }

                if (!q.data.length) {
                    list.innerHTML = `<div class="empty">Belum ada owner.</div>`;
                    return;
                }

                list.innerHTML = q.data.map(ownerItem).join("");

                list.querySelectorAll("[data-copy]").forEach((btn) => {
                    btn.addEventListener("click", async () => {
                        await navigator.clipboard.writeText(btn.getAttribute("data-copy"));
                        btn.textContent = "Copied";
                        setTimeout(() => { btn.textContent = "Copy Link"; }, 1200);
                    });
                });
                list.querySelectorAll("[data-open]").forEach((btn) => {
                    btn.addEventListener("click", () => navigate(`/profile/${btn.getAttribute("data-open")}`));
                });
            }

            await loadMyOwners();
        }

        function buildChannelLink(owner, method, messageText) {
            const msg = encodeURIComponent(messageText);
            if (method === "wa") {
                return `https://api.whatsapp.com/send?phone=${encodeURIComponent(owner.owner_whatsapp || "")}&text=${msg}`;
            }
            if (method === "email") {
                return `mailto:${encodeURIComponent(owner.owner_email || "")}?subject=${encodeURIComponent("Info Barang Ketemuin")}&body=${msg}`;
            }
            if (method === "telegram") {
                if (!owner.owner_telegram) {
                    return "";
                }
                return `https://t.me/${encodeURIComponent(owner.owner_telegram)}?text=${msg}`;
            }
            return "";
        }

        async function publicProfileView(shortId) {
            const app = document.getElementById("app");
            const q = await sb.from("owners").select("*").eq("short_id", shortId).single();

            if (q.error || !q.data) {
                app.innerHTML = `
                    <section class="panel" style="max-width:700px; margin: 10px auto;">
                        <h2>Profil Tidak Ditemukan</h2>
                        <p class="lead">Owner ID tidak valid atau data sudah dihapus.</p>
                        <div class="row"><button class="btn btn-primary" id="nfBack">Kembali</button></div>
                    </section>
                `;
                document.getElementById("nfBack").addEventListener("click", () => navigate("/"));
                return;
            }

            const owner = q.data;
            const avatar = owner.owner_avatar
                ? `<img src="${esc(owner.owner_avatar)}" alt="Avatar">`
                : esc((owner.owner_name || "O").slice(0, 1).toUpperCase());

            app.innerHTML = `
                <section class="panel">
                    <div class="profile-head">
                        <div class="avatar">${avatar}</div>
                        <div>
                            <h2>${esc(owner.owner_name)}</h2>
                            <div class="meta">Barang: ${esc(owner.item_name)}</div>
                            ${owner.owner_bio ? `<div class="meta" style="margin-top:5px;">${esc(owner.owner_bio)}</div>` : ""}
                        </div>
                    </div>

                    <div style="margin-top:10px;">
                        <span class="pill">WA: ${esc(owner.owner_whatsapp)}</span>
                        ${owner.owner_email ? `<span class="pill">Email: ${esc(owner.owner_email)}</span>` : ""}
                        ${owner.owner_telegram ? `<span class="pill">Telegram: @${esc(owner.owner_telegram)}</span>` : ""}
                    </div>

                    <div class="row" style="margin-top:10px;">
                        <a class="btn btn-primary" href="${buildChannelLink(owner, "wa", "Halo, saya menemukan barangmu.")}" target="_blank" rel="noopener noreferrer">WhatsApp</a>
                        ${owner.owner_email ? `<a class="btn btn-soft" href="${buildChannelLink(owner, "email", "Halo, saya menemukan barangmu.")}">Email</a>` : ""}
                        ${owner.owner_telegram ? `<a class="btn btn-soft" href="${buildChannelLink(owner, "telegram", "Halo, saya menemukan barangmu.")}" target="_blank" rel="noopener noreferrer">Telegram</a>` : ""}
                    </div>

                    <hr class="divider">

                    <h3>Bagikan Lokasi</h3>
                    <p class="lead">Klik untuk mengirim titik lokasi penemuan.</p>
                    <div class="row">
                        <button class="btn btn-primary" id="shareLocBtn">Bagikan Lokasi</button>
                    </div>
                    <div id="locStatus"></div>

                    <hr class="divider">

                    <h3>Kirim Pesan</h3>
                    <div class="form-grid">
                        <div>
                            <label>Nama Kamu</label>
                            <input id="finderName" placeholder="Nama kamu">
                        </div>
                        <div>
                            <label>Channel</label>
                            <select id="finderMethod">
                                <option value="wa">WhatsApp</option>
                                <option value="email" ${owner.owner_email ? "" : "disabled"}>Email</option>
                                <option value="telegram" ${owner.owner_telegram ? "" : "disabled"}>Telegram</option>
                            </select>
                        </div>
                        <div class="full">
                            <label>Pesan</label>
                            <textarea id="finderMessage" placeholder="Halo, saya menemukan barangmu di..."></textarea>
                        </div>
                        <div class="full row">
                            <button class="btn btn-primary" id="sendBtn">Kirim</button>
                        </div>
                    </div>
                    <div id="msgStatus"></div>
                </section>
            `;

            document.getElementById("shareLocBtn").addEventListener("click", () => {
                const slot = document.getElementById("locStatus");
                if (!navigator.geolocation) {
                    slot.innerHTML = status("err", "Browser tidak mendukung geolocation.");
                    return;
                }

                slot.innerHTML = status("ok", "Mengambil lokasi...");
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const maps = `https://maps.google.com/?q=${lat},${lng}`;

                    const ins = await sb.from("location_logs").insert({
                        owner_id: owner.id,
                        lat,
                        lng,
                        maps_url: maps
                    });

                    if (ins.error) {
                        slot.innerHTML = status("err", ins.error.message);
                        return;
                    }

                    slot.innerHTML = `<div class="status ok">Lokasi tersimpan. <a href="${maps}" target="_blank" rel="noopener noreferrer">Buka Maps</a></div>`;
                }, () => {
                    slot.innerHTML = status("err", "Izin lokasi ditolak atau gagal dibaca.");
                });
            });

            document.getElementById("sendBtn").addEventListener("click", async () => {
                const finderName = document.getElementById("finderName").value.trim() || "Penemu";
                const finderMethod = document.getElementById("finderMethod").value;
                const msg = document.getElementById("finderMessage").value.trim();
                const slot = document.getElementById("msgStatus");

                if (!msg) {
                    slot.innerHTML = status("err", "Pesan tidak boleh kosong.");
                    return;
                }

                const save = await sb.from("messages").insert({
                    owner_id: owner.id,
                    finder_name: finderName,
                    finder_method: finderMethod,
                    message_text: msg
                });

                if (save.error) {
                    slot.innerHTML = status("err", save.error.message);
                    return;
                }

                const full = `[Ketemuin] ${finderName}: ${msg}`;
                const channelLink = buildChannelLink(owner, finderMethod, full);
                if (channelLink) {
                    window.open(channelLink, "_blank", "noopener,noreferrer");
                }

                slot.innerHTML = status("ok", "Pesan tersimpan dan channel komunikasi dibuka.");
                document.getElementById("finderMessage").value = "";
            });
        }

        function notFoundView(text) {
            const app = document.getElementById("app");
            app.innerHTML = `
                <section class="panel" style="max-width:700px; margin: 10px auto;">
                    <h2>Halaman Tidak Ada</h2>
                    <p class="lead">${esc(text)}</p>
                    <div class="row"><button class="btn btn-primary" id="goBackHome">Kembali Home</button></div>
                </section>
            `;
            document.getElementById("goBackHome").addEventListener("click", () => navigate("/"));
        }

        async function renderRoute() {
            if (!sb && !ensureSupabaseConfigured()) {
                setupMissingView();
                return;
            }

            const path = getCurrentPath();

            if (path === "/") {
                landingView();
                return;
            }

            if (path === "/admin") {
                const sessionRes = await sb.auth.getSession();
                currentUser = sessionRes.data.session ? sessionRes.data.session.user : null;
                if (!currentUser) {
                    adminLoginView();
                    return;
                }
                await adminDashboardView();
                return;
            }

            if (path.startsWith("/profile/")) {
                const shortId = path.replace("/profile/", "").trim();
                if (!shortId) {
                    notFoundView("ID owner kosong.");
                    return;
                }
                await publicProfileView(shortId);
                return;
            }

            notFoundView("Route tidak ditemukan.");
        }

        document.getElementById("brandHome").addEventListener("click", () => navigate("/"));
        document.getElementById("goHome").addEventListener("click", () => navigate("/"));
        document.getElementById("goAdmin").addEventListener("click", () => navigate("/admin"));

        window.addEventListener("popstate", () => { renderRoute(); });
        window.addEventListener("hashchange", () => { renderRoute(); });

        (async function bootstrap() {
            const ready = await initSupabase();
            if (!ready) {
                return;
            }
            await renderRoute();
        })();
    </script>
</body>
</html>
